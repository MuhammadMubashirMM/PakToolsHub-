<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - Age Calculator</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Calculate your exact age in years, months and days instantly with our free online Age Calculator.">

<meta name="keywords" content="Age Calculator, Date Calculator, Birthday Calculator, Online Age Calculator">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#eef4ff;
text-align:center;
margin:0;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
font-size:16px;
width:80%;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
margin-top:15px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>

<div class="card">
<h2>📅 Age Calculator</h2>

<input type="date" id="dob">

<br>

<button onclick="calculateAge()">Calculate Age</button>

<h3 id="result"></h3>
<p id="nextBirthday"></p>
<p id="totalDays"></p>
<p id="birthDay"></p>

</div>

<script>
function calculateAge(){

let dob = new Date(document.getElementById("dob").value);

if(!document.getElementById("dob").value){
alert("Please select your Date of Birth");
return;
}

let today = new Date();

let years = today.getFullYear() - dob.getFullYear();
let months = today.getMonth() - dob.getMonth();
let days = today.getDate() - dob.getDate();

if(days < 0){
months--;
days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
}

if(months < 0){
years--;
months += 12;
}

document.getElementById("result").innerHTML =
"🎂 <b>Your Age</b><br><br>" +
years + " Years<br>" +
months + " Months<br>" +
days + " Days";

let nextBirthday = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());

if(nextBirthday < today){
nextBirthday.setFullYear(today.getFullYear()+1);
}

let diff = nextBirthday - today;
let daysLeft = Math.ceil(diff/(1000*60*60*24));

document.getElementById("nextBirthday").innerHTML =
"🎉 Next Birthday: <b>"+daysLeft+" Days Left</b>";

let totalDays = Math.floor((today-dob)/(1000*60*60*24));

document.getElementById("totalDays").innerHTML =
"📅 Total Days Lived: <b>"+totalDays+"</b>";

let week=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

document.getElementById("birthDay").innerHTML =
"📆 Born on: <b>"+week[dob.getDay()]+"</b>";

}
</script>

</body>
</html>
