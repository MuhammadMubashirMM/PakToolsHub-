<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - Age Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#eef4ff;
text-align:center;
margin:0;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
font-size:16px;
width:80%;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
margin-top:15px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>

<div class="card">
<h2>📅 Age Calculator</h2>

<input type="date" id="dob">

<br>

<button onclick="calculateAge()">Calculate Age</button>

<h3 id="result"></h3>

</div>

<script>
function calculateAge(){

let dob=new Date(document.getElementById("dob").value);

let today=new Date();

let age=today.getFullYear()-dob.getFullYear();

let month=today.getMonth()-dob.getMonth();

if(month<0 || (month===0 && today.getDate()<dob.getDate())){
age--;
}

document.getElementById("result").innerHTML="🎂 Your Age is "+age+" Years";
}
</script>

</body>
</html>
