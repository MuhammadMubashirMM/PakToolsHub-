<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - Age Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#eef4ff;
text-align:center;
margin:0;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
font-size:16px;
width:80%;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
margin-top:15px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>

<div class="card">
<h2>📅 Age Calculator</h2>

<input type="date" id="dob">

<br>

<button onclick="calculateAge()">Calculate Age</button>

<h3 id="result"></h3>

</div>

<script>
function calculateAge() {

let dob = new Date(document.getElementById("dob").value);
let today = new Date();

let years = today.getFullYear() - dob.getFullYear();
let months = today.getMonth() - dob.getMonth();
let days = today.getDate() - dob.getDate();

if (days < 0) {
    months--;
    let lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
    days += lastMonth.getDate();
}

if (months < 0) {
    years--;
    months += 12;
}

document.getElementById("result").innerHTML =
"🎂 Your Age is <br><br>" +
"<b>" + years + "</b> Years<br>" +
"<b>" + months + "</b> Months<br>" +
"<b>" + days + "</b> Days";

}
</script>

</body>
</html>
