<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - BMI Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#eef4ff;
margin:0;
text-align:center;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input{
width:85%;
padding:12px;
margin:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
  
  .result-card{
background:#f8fafc;
border:2px solid #2563eb;
border-radius:12px;
padding:20px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
  }
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>
<div style="margin:20px;">
<label><b>🌍 Language:</b></label>

<select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="ur">اردو</option>
</select>
</div>
<div class="card">

<h2>⚖️ BMI Calculator</h2>

<select id="gender">
<option value="male">👨 Male</option>
<option value="female">👩 Female</option>
</select>

<br><br>

<input type="number" id="age" placeholder="Enter Age">

<input type="number" id="weight" placeholder="Weight">

<select id="weightUnit">
<option value="kg">Kilograms (kg)</option>
<option value="lb">Pounds (lb)</option>
</select>

<br><br>

<input type="number" id="height" placeholder="Height">

<select id="unit">
<option value="cm">Centimeters (cm)</option>
<option value="m">Meters (m)</option>
<option value="ft">Feet (ft)</option>
<option value="in">Inches (in)</option>
</select>

<br><br>

<button onclick="calculateBMI()">Calculate BMI</button>
<button onclick="resetForm()">Reset</button>
<button onclick="downloadImage()">📷 Download Image</button>

<button onclick="downloadPDF()">📄 Download PDF</button>
<button onclick="shareWhatsApp()">📱 WhatsApp</button>

<button onclick="shareFacebook()">📘 Facebook</button>

<button onclick="shareX()">𝕏 X (Twitter)</button>
<button onclick="copyResult()">📋 Copy Result</button>

<button onclick="printResult()">🖨️ Print Result</button>
<div id="result" class="result-card">
  
</div>
  <div style="width:100%;background:#ddd;border-radius:10px;margin-top:20px;">
  <div id="bmiBar" style="width:0%;height:20px;background:#2563eb;border-radius:10px;"></div>
  </div>
</div>
<script>

function calculateBMI(){

let weight = parseFloat(document.getElementById("weight").value);
let height = parseFloat(document.getElementById("height").value);
let age = parseInt(document.getElementById("age").value);

let weightUnit = document.getElementById("weightUnit").value;
let unit = document.getElementById("unit").value;
let gender = document.getElementById("gender").value;

if(!weight || !height || !age){
alert("Please fill all fields.");
return;
}

// Weight conversion
if(weightUnit=="lb"){
weight = weight * 0.453592;
}

// Height conversion
if(unit=="cm"){
height = height / 100;
}
else if(unit=="ft"){
height = height * 0.3048;
}
else if(unit=="in"){
height = height * 0.0254;
}
// اگر unit == "m" ہو تو کچھ کرنے کی ضرورت نہیں

let bmi = (weight / (height * height)).toFixed(1);

let category="";
  

// Ideal weight
let minWeight=(18.5*height*height).toFixed(1);
let maxWeight=(24.9*height*height).toFixed(1);

// Daily Calories (Estimated)
let calories;
  let tips = "";

if(bmi < 18.5){
    tips = "🥗 Eat a balanced diet.";
}
else if(bmi < 25){
    tips = "✅ Great! Maintain your healthy lifestyle.";
}
else if(bmi < 30){
    tips = "🚶 Exercise regularly.";
}
else{
    tips = "❤️ Consult a healthcare professional.";
}

if(bmi<18.5){
category="🟡 Underweight";
}
else if(bmi<25){
category="🟢 Normal Weight";
}
else if(bmi<30){
category="🟠 Overweight";
}
else{
category="🔴 Obese";
}

if(gender=="male"){
calories = 10*weight + 6.25*(height*100) - 5*age + 5;
}else{
calories = 10*weight + 6.25*(height*100) - 5*age - 161;
}

calories = Math.round(calories);

// Progress Bar
let percent = (parseFloat(bmi) / 40) * 100;

if(percent > 100){
    percent = 100;
}

document.getElementById("bmiBar").style.width = percent + "%";

if(bmi < 18.5){
    document.getElementById("bmiBar").style.background = "#facc15";
}
else if(bmi < 25){
    document.getElementById("bmiBar").style.background = "#22c55e";
}
else if(bmi < 30){
    document.getElementById("bmiBar").style.background = "#f97316";
}
else{
    document.getElementById("bmiBar").style.background = "#ef4444";
}

// Show Result
document.getElementById("result").innerHTML =
"<h3>Your BMI: " + bmi + "</h3>" +
"<p>" + category + "</p>" +
"<p>🎯 Ideal Weight: " + minWeight + " kg - " + maxWeight + " kg</p>" +
"<p>🔥 Estimated Daily Calories: " + calories + " kcal/day</p>" +
"<p>💡 " + tips + "</p>";

} // <-- calculateBMI function ends here

document.getElementById("bmiBar").style.width = percent + "%";

if(bmi < 18.5){
    document.getElementById("bmiBar").style.background = "#facc15"; // Yellow
}
else if(bmi < 25){
    document.getElementById("bmiBar").style.background = "#22c55e"; // Green
}
else if(bmi < 30){
    document.getElementById("bmiBar").style.background = "#f97316"; // Orange
}
else{
    document.getElementById("bmiBar").style.background = "#ef4444"; // Red
  }
"<h3>Your BMI: "+bmi+"</h3>" +
"<p>"+category+"</p>" +
"<p>🎯 Ideal Weight: "+minWeight+" kg - "+maxWeight+" kg</p>" +
"<p>🔥 Estimated Daily Calories: "+calories+" kcal/day</p>";
"<p>💡 "+tips+"</p>";
}
  function resetForm(){

document.getElementById("age").value="";
document.getElementById("weight").value="";
document.getElementById("height").value="";
document.getElementById("result").innerHTML="";

document.getElementById("gender").selectedIndex=0;
document.getElementById("weightUnit").selectedIndex=0;
document.getElementById("unit").selectedIndex=0;

}
  function getResultText(){

return document.getElementById("result").innerText;

}

function shareWhatsApp(){

let text = encodeURIComponent(getResultText());

window.open("https://wa.me/?text=" + text,"_blank");

}

function shareFacebook(){

let url = encodeURIComponent(window.location.href);

window.open("https://www.facebook.com/sharer/sharer.php?u=" + url,"_blank");

}

function shareX(){

let text = encodeURIComponent(getResultText());

window.open("https://twitter.com/intent/tweet?text=" + text,"_blank");

  }
  function copyResult(){

let text = document.getElementById("result").innerText;

navigator.clipboard.writeText(text).then(function(){

alert("BMI Result Copied!");

});

}

function printResult(){

let result = document.getElementById("result").innerHTML;

let win = window.open("", "", "width=700,height=700");

win.document.write(`
<html>
<head>
<title>BMI Result</title>
<style>
body{
font-family:Arial;
padding:30px;
text-align:center;
}
.result{
border:2px solid #2563eb;
padding:20px;
border-radius:10px;
}
</style>
</head>
<body>
<h2>PakToolsHub - BMI Result</h2>
<div class="result">
${result}
</div>
</body>
</html>
`);

win.document.close();
win.print();

  }
function changeLanguage(){

let lang = document.getElementById("language").value;

if(lang=="ur"){

document.querySelector("h2").innerText="⚖️ بی ایم آئی کیلکولیٹر";

document.getElementById("age").placeholder="عمر درج کریں";

document.getElementById("weight").placeholder="وزن درج کریں";

document.getElementById("height").placeholder="قد درج کریں";

document.querySelector('button[onclick="calculateBMI()"]').innerText="حساب کریں";

document.querySelector('button[onclick="resetForm()"]').innerText="ری سیٹ";

}else{

document.querySelector("h2").innerText="⚖️ BMI Calculator";

document.getElementById("age").placeholder="Enter Age";

document.getElementById("weight").placeholder="Weight";

document.getElementById("height").placeholder="Height";

document.querySelector('button[onclick="calculateBMI()"]').innerText="Calculate BMI";

document.querySelector('button[onclick="resetForm()"]').innerText="Reset";

}

  }
  async function downloadImage(){

const card = document.querySelector(".card");

const canvas = await html2canvas(card);

const link = document.createElement("a");

link.download = "BMI-Result.png";

link.href = canvas.toDataURL();

link.click();

}

async function downloadPDF(){

const { jsPDF } = window.jspdf;

const card = document.querySelector(".card");

const canvas = await html2canvas(card);

const imgData = canvas.toDataURL("image/png");

const pdf = new jsPDF();

pdf.addImage(imgData,"PNG",10,10,190,0);

pdf.save("BMI-Result.pdf");

}
</script>

</body>
                 </html>
