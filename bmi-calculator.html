<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - BMI Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#eef4ff;
margin:0;
text-align:center;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input{
width:85%;
padding:12px;
margin:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>

<div class="card">

<h2>⚖️ BMI Calculator</h2>

<input type="number" id="weight" placeholder="Weight (kg)">

<input type="number" id="height" placeholder="Height (cm)">

<button onclick="calculateBMI()">Calculate BMI</button>

<div id="result"></div>

</div>

<script>

function calculateBMI(){

let weight=parseFloat(document.getElementById("weight").value);
let height=parseFloat(document.getElementById("height").value)/100;

if(!weight || !height){
alert("Please enter weight and height.");
return;
}

let bmi=(weight/(height*height)).toFixed(1);

let status="";

if(bmi<18.5){
status="🟡 Underweight";
}
else if(bmi<25){
status="🟢 Normal Weight";
}
else if(bmi<30){
status="🟠 Overweight";
}
else{
status="🔴 Obese";
}

document.getElementById("result").innerHTML=
"Your BMI: <b>"+bmi+"</b><br>"+status;

}

</script>

</body>
                 </html>
