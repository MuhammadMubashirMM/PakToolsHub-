<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - Currency Converter</title>
  <meta name="description" content="Convert currencies with accurate exchange rates using our free online Currency Converter.">

<meta name="keywords" content="Currency Converter, Exchange Rate, Money Converter">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eef4ff;
margin:0;
text-align:center;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input,select{
width:90%;
padding:12px;
margin:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
margin:8px;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#2563eb;
}

</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>

<div class="card">

<h2>💱 Currency Converter</h2>
  <h3>⭐ Favorite Currencies</h3>

<button onclick="setFavorite('USD','PKR')">USD → PKR</button>

<button onclick="setFavorite('PKR','USD')">PKR → USD</button>

<button onclick="setFavorite('EUR','USD')">EUR → USD</button>

<button onclick="setFavorite('GBP','PKR')">GBP → PKR</button>

<br><br>
  <input type="number" id="amount" placeholder="Enter Amount">

<select id="fromCurrency">
<option value="USD">🇺🇸 US Dollar (USD)</option>
<option value="PKR">🇵🇰 Pakistani Rupee (PKR)</option>
<option value="EUR">🇪🇺 Euro (EUR)</option>
<option value="GBP">🇬🇧 British Pound (GBP)</option>
</select>

<button onclick="swapCurrency()">🔄 Swap</button>

<select id="toCurrency">
<option value="PKR">🇵🇰 Pakistani Rupee (PKR)</option>
<option value="USD">🇺🇸 US Dollar (USD)</option>
<option value="EUR">🇪🇺 Euro (EUR)</option>
<option value="GBP">🇬🇧 British Pound (GBP)</option>
</select>

<br><br>

<button onclick="convertCurrency()">💱 Convert</button>

<button onclick="resetForm()">🔄 Reset</button>
  <button onclick="shareResult()">📤 Share</button>
  <button onclick="copyResult()">📋 Copy Result</button>
<button onclick="downloadImage()">📷 Download Image</button>

<button onclick="downloadPDF()">📄 Download PDF</button>
<div id="result"></div>
  <hr>

<h3>🕒 Recent Conversions</h3>

<div id="history"></div>
</div> 

<!-- اگلے Step میں یہاں Inputs آئیں گے -->
<script>
let historyList = [];
  function swapCurrency(){

let from = document.getElementById("fromCurrency");

let to = document.getElementById("toCurrency");

let temp = from.value;

from.value = to.value;

to.value = temp;

}
  function resetForm(){

document.getElementById("amount").value = "";

document.getElementById("fromCurrency").selectedIndex = 0;

document.getElementById("toCurrency").selectedIndex = 0;

document.getElementById("result").innerHTML = "";
historyList = [];

document.getElementById("history").innerHTML = "";
}
  async function shareResult(){

let text = document.getElementById("result").innerText;

if(!text){
alert("Please convert currency first.");
return;
}

if(navigator.share){

await navigator.share({
title:"PakToolsHub Currency Converter",
text:text,
url:window.location.href
});

}else{

alert("Sharing not supported on this device.");

}

}
  function copyResult(){

let text = document.getElementById("result").innerText;

if(text==""){
alert("Please convert currency first.");
return;
}

navigator.clipboard.writeText(text);

alert("Result Copied!");

}
  async function convertCurrency(){

let amount = parseFloat(document.getElementById("amount").value);

let from = document.getElementById("fromCurrency").value;

let to = document.getElementById("toCurrency").value;

if(!amount){
alert("Please enter amount");
return;
}

try{

let response = await fetch("https://open.er-api.com/v6/latest/" + from);

let data = await response.json();

let rate = data.rates[to];

let result = (amount * rate).toFixed(2);

document.getElementById("result").innerHTML =
amount + " " + from + " = <b>" + result + " " + to + "</b>";
historyList.unshift(amount + " " + from + " → " + result + " " + to);

if(historyList.length > 5){
historyList.pop();
}

document.getElementById("history").innerHTML =
historyList.map(item => "<p>✅ " + item + "</p>").join("");
}catch(error){

document.getElementById("result").innerHTML =
"<div style='background:#f8fafc;padding:20px;border:2px solid #2563eb;border-radius:12px;'>" +
"<h3>💱 Conversion Result</h3>" +
"<p><b>" + amount + " " + from + " = " + result + " " + to + "</b></p>" +
"<p>📈 1 " + from + " = " + rate.toFixed(4) + " " + to + "</p>" +

"❌ Unable to fetch live exchange rates.";

}

} 
function setFavorite(from,to){

document.getElementById("fromCurrency").value = from;

document.getElementById("toCurrency").value = to;

  }
  
  async function downloadImage(){

const card = document.querySelector(".card");

const canvas = await html2canvas(card);

const link = document.createElement("a");

link.download = "Currency-Converter-Result.png";

link.href = canvas.toDataURL();

link.click();

}

async function downloadPDF(){

const { jsPDF } = window.jspdf;

const card = document.querySelector(".card");

const canvas = await html2canvas(card);

const imgData = canvas.toDataURL("image/png");

const pdf = new jsPDF();

pdf.addImage(imgData,"PNG",10,10,190,0);

pdf.save("Currency-Converter-Result.pdf");

  }
</script>
</body>
</html>
