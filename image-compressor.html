<!DOCTYPE html>
<html>

<head>
<title>PakToolsHub - Image Compressor</title>
 <link rel="icon" type="image/png" href="favicon.png"> 
  <meta name="description" content="Compress JPG, PNG and WebP images online without losing quality.">

<meta name="keywords" content="Image Compressor, Compress Image, JPG Compressor, PNG Compressor">
 <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef4ff;
padding:20px;
}

.container{
max-width:700px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}
h1{
color:#2563eb;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
}

input[type="file"]{
width:100%;
padding:15px;
border:2px dashed #2563eb;
border-radius:10px;
background:#f8fbff;
cursor:pointer;
margin-bottom:20px;
}

.preview img{
max-width:100%;
margin-top:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:12px 25px;
margin:8px;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.result{
margin-top:20px;
padding:15px;
background:#f8fbff;
border-radius:10px;
color:#333;
font-size:15px;
}

.download-btn{
background:#16a34a;
}

.download-btn:hover{
background:#15803d;
}

@media(max-width:768px){

.container{
padding:18px;
}

button{
width:100%;
margin:8px 0;
}

h1{
font-size:28px;
}

}

 </style>
 <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FYG8GY51CH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-FYG8GY51CH');
</script>
</head>

<body>

<h1>PakToolsHub</h1>
<div class="container">
<h2>🖼️ Image Compressor</h2>

<input type="file" id="imageInput" accept="image/*">

<br><br>
<label>Compression Quality</label>

<br><br>

<input type="range" id="quality" min="10" max="100" value="50">

<p id="qualityValue">50%</p>
<button onclick="compressImage()">Compress Image</button>

<br><br>

<img id="preview" style="max-width:300px;display:none;">

<br><br>

<a id="downloadBtn" style="display:none;">Download Image</a>
<p id="imageInfo"></p>
<script>
let quality=document.getElementById("quality");

let qualityValue=document.getElementById("qualityValue");

quality.oninput=function(){

qualityValue.innerHTML=this.value+"%";

}
// یہاں compressImage() والا function پیسٹ کریں
function compressImage(){

let file = document.getElementById("imageInput").files[0];

if(!file){
alert("Please select an image");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();

img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

let compressed = canvas.toDataURL("image/jpeg", quality.value/100);
let originalSize = (file.size / 1024).toFixed(2);

let compressedSize = ((compressed.length * 3 / 4) / 1024).toFixed(2);

let saved = (((originalSize - compressedSize) / originalSize) * 100).toFixed(1);

document.getElementById("imageInfo").innerHTML =
"📁 Original: " + originalSize + " KB<br>" +
"🗜️ Compressed: " + compressedSize + " KB<br>" +
"✅ Saved: " + saved + "%";
document.getElementById("preview").src = compressed;
document.getElementById("preview").style.display = "block";

let download = document.getElementById("downloadBtn");

download.href = compressed;
download.download = "compressed-image.jpg";
download.innerHTML = "⬇️ Download Compressed Image";
download.style.display = "inline";

}

}

reader.readAsDataURL(file);

}
</script>

</body>
</html>
