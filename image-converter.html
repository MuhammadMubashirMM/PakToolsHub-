    <body>

<div class="container">

<h1>🖼️ Image Converter Pro</h1>

<p class="subtitle">
Convert JPG, PNG & WEBP images online for free.
</p>

<label class="upload-box" id="dropArea">

<div style="font-size:55px;">📤</div>

<h3>Drag & Drop Image Here</h3>

<p>or Click to Choose Image</p>

<input type="file" id="imageInput" accept="image/*">

</label>
<div class="preview">

<img id="previewImage">

</div>

<select id="format">

<option value="image/png">PNG</option>

<option value="image/jpeg">JPG</option>

<option value="image/webp">WEBP</option>

</select>

<button id="convertBtn">
🔄 Convert Image
</button>

<button id="downloadBtn" style="display:none;">
⬇ Download Image
</button>
<button onclick="resetTool()">♻ Reset</button>

<div class="info" id="info">
No image selected.
</div>


</div> 
      <script>

const input=document.getElementById("imageInput");
const preview=document.getElementById("previewImage");
const previewBox=document.querySelector(".preview");
const convertBtn=document.getElementById("convertBtn");
const downloadBtn=document.getElementById("downloadBtn");
const format=document.getElementById("format");
const info=document.getElementById("info");

let imageURL="";

input.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

imageURL=URL.createObjectURL(file);

preview.src=imageURL;

previewBox.style.display="block";

const img = new Image();

img.onload = function(){

info.innerHTML=
"📄 File: "+file.name+
"<br>📦 Size: "+(file.size/1024).toFixed(2)+" KB"+
"<br>📐 Dimensions: "+img.width+" × "+img.height+" px"+
"<br>🖼 Format: "+file.type;

};

img.src=imageURL; 
});

convertBtn.addEventListener("click",function(){

if(!preview.src){

alert("Please upload an image.");

return;

}

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

const img=new Image();

img.onload=function(){

canvas.width=img.width;

canvas.height=img.height;

ctx.drawImage(img,0,0);

const mime=format.value;

const dataURL=canvas.toDataURL(mime);

downloadBtn.style.display="block";

downloadBtn.onclick=function(){

const a=document.createElement("a");

a.href=dataURL;

if(mime==="image/png"){
a.download="converted-image.png";
}else if(mime==="image/webp"){
a.download="converted-image.webp";
}else{
a.download="converted-image.jpg";
}

a.click();

};

};

img.src=preview.src;

});

</script>
