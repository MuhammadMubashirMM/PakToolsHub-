<!-- Cropper CSS -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef4ff;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#2563eb;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:20px;
}

.upload-box{
border:2px dashed #2563eb;
padding:25px;
border-radius:12px;
background:#f8fbff;
cursor:pointer;
margin-bottom:20px;
}

input[type=file]{
display:none;
}

#image{
max-width:100%;
display:block;
margin:auto;
}

.buttons{
margin-top:20px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
margin:6px;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

background:#16a34a;
}

background:#15803d;
}

.container{
margin:15px;

}

  }

</head>

<body>

<div class="container">

<h1>🖼️ Image Cropper Pro</h1>

<p>Upload your image, crop it, rotate it and download instantly.</p>

<label class="upload-box" id="dropArea">

📤 Drag & Drop Image Here

<br><br>

or Click to Upload

<input type="file" id="inputImage" accept="image/*">

</label> 

📤 Click to Upload Image

<input type="file" id="inputImage" accept="image/*">

</label>

<div>

<img id="image">

</div>
<div class="controls">

<select id="ratio">

<option value="NaN">Free Crop</option>

<option value="1">1 : 1</option>

<option value="1.7777778">16 : 9</option>

<option value="1.3333333">4 : 3</option>

</select>

</div>
<div class="buttons">

<button onclick="zoomIn()">🔍 Zoom In</button>

<button onclick="zoomOut()">🔎 Zoom Out</button>

<button onclick="rotateLeft()">↩ Rotate Left</button>

<button onclick="rotateRight()">↪ Rotate Right</button>
<button onclick="flipHorizontal()">↔ Flip Horizontal</button>

<button onclick="flipVertical()">↕ Flip Vertical</button>
  <button onclick="undoCrop()">↩ Undo</button>

<button onclick="redoCrop()">↪ Redo</button>
<button onclick="resetImage()">♻ Reset</button>
<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPG</option>
</select>
<button class="download" onclick="downloadImage()">⬇ Download</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>

let cropper;
let scaleX = 1;
let scaleY = 1;
  let history = [];
let historyIndex = -1;
const image=document.getElementById("image");

document.getElementById("inputImage").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=function(event){

image.src=event.target.result;

if(cropper){

cropper.destroy();

}

image.onload=function(){

cropper=new Cropper(image,{

viewMode:1,

autoCropArea:1,

responsive:true, 
  crop(event){

history.push(cropper.getData());

historyIndex = history.length - 1;

  }
document.getElementById("ratio").addEventListener("change", function () {

if(!cropper) return;

let value=this.value;

if(value==="NaN"){
cropper.setAspectRatio(NaN);
}else{
cropper.setAspectRatio(parseFloat(value));
}

}); 
};

};

reader.readAsDataURL(file);

});

function zoomIn(){

if(cropper) cropper.zoom(0.1);

}

function zoomOut(){

if(cropper) cropper.zoom(-0.1);

}

function rotateLeft(){

if(cropper) cropper.rotate(-90);

}

function rotateRight(){

if(cropper) cropper.rotate(90);

}

function resetImage(){

if(cropper) cropper.reset();

}

function downloadImage(){

if(!cropper) return;

const format=document.getElementById("format").value;

const canvas=cropper.getCroppedCanvas();

const link=document.createElement("a");

link.download="cropped-image."+format;

link.href=canvas.toDataURL("image/"+format);

link.click();

}
function flipHorizontal(){

if(!cropper) return;

scaleX = scaleX * -1;

cropper.scaleX(scaleX);

}

function flipVertical(){

if(!cropper) return;

scaleY = scaleY * -1;

cropper.scaleY(scaleY);

   }
  function undoCrop(){

if(historyIndex>0){

historyIndex--;

cropper.setData(history[historyIndex]);

}

}

function redoCrop(){

if(historyIndex<history.length-1){

historyIndex++;

cropper.setData(history[historyIndex]);

}

  }
</script>

</body>

</html>
