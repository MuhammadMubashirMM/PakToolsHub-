<!DOCTYPE html>
<html>
<head>

<title>PakToolsHub - Image Resizer</title>
<meta name="description" content="Resize JPG, PNG and WebP images by changing width and height online for free.">

<meta name="keywords" content="Image Resizer, Resize Image, JPG Resizer, PNG Resizer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eef4ff;
margin:0;
text-align:center;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:600px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input{
width:90%;
padding:12px;
margin:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
margin:8px;
border-radius:8px;
cursor:pointer;
}

canvas{
max-width:100%;
margin-top:20px;
border:1px solid #ddd;
}
 @media(max-width:600px){

.card{
margin:15px;
padding:15px;
}

button,
input{
width:95%;
margin:8px 0;
}

canvas{
width:100%;
height:auto;
}

  } 

</style>

</head>

<body>

<div class="header">

<h1>PakToolsHub</h1>

<p>Free Online Tools</p>

</div>

<div class="card">

<h2>🖼️ Image Resizer</h2>
<div id="dropArea" style="border:2px dashed #2563eb;padding:30px;border-radius:10px;margin-bottom:15px;">

🖼️ Drag & Drop Image Here

<br><br>

OR

</div>
<input type="file" id="imageInput" accept="image/*">

<input type="number" id="width" placeholder="Width (px)">

<input type="number" id="height" placeholder="Height (px)">

<br>

<button onclick="resizeImage()">🖼️ Resize Image</button>

<button onclick="resetTool()">🔄 Reset</button>
<button onclick="downloadImage()">📥 Download Image</button>
<button onclick="shareImage()">📤 Share</button>
<button onclick="copyImage()">📋 Copy Image</button> 
<button onclick="toggleLanguage()">🌍 English / اردو</button>  
<canvas id="canvas"></canvas>
<div id="imageInfo" style="margin-top:20px;"></div>
</div>

<script>
function resizeImage(){

let file = document.getElementById("imageInput").files[0];

if(!file){
alert("Please select an image.");
return;
}

let width = parseInt(document.getElementById("width").value);
let height = parseInt(document.getElementById("height").value);

if(!width || !height){
alert("Please enter width and height.");
return;
}

let img = new Image();

img.onload = function(){

let canvas = document.getElementById("canvas");

let ctx = canvas.getContext("2d");

canvas.width = width;
canvas.height = height;

ctx.drawImage(img,0,0,width,height);
document.getElementById("imageInfo").innerHTML =

"<div style='background:#fff;padding:20px;border:2px solid #2563eb;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.1);margin-top:20px;text-align:left;'>"+

"<h3>✅ Image Resized Successfully</h3>"+

"<p><b>🖼️ Original Size:</b> "+img.width+" × "+img.height+" px</p>"+

"<p><b>📏 New Size:</b> "+width+" × "+height+" px</p>"+

"<p><b>📅 Date & Time:</b> "+new Date().toLocaleString()+"</p>"+

"<p><b>📥 Status:</b> Ready to Download</p>"+

"<hr>"+

"<p style='text-align:center;font-weight:bold;color:#2563eb;'>PakToolsHub</p>"+

"</div>";

"<div style='background:#f8fafc;padding:15px;border:2px solid #2563eb;border-radius:10px;text-align:left;margin-top:20px;'>"+

"<h3>🖼️ Image Information</h3>"+

"<p><b>Original Size:</b> " + img.width + " × " + img.height + " px</p>"+

"<p><b>Resized Size:</b> " + width + " × " + height + " px</p>"+

"<p><b>Status:</b> ✅ Image Resized Successfully</p>"+

"</div>";
};

img.src = URL.createObjectURL(file);

}

function resetTool(){

document.getElementById("imageInput").value = "";

document.getElementById("width").value = "";

document.getElementById("height").value = "";

let canvas = document.getElementById("canvas");

canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);

canvas.width = 0;
canvas.height = 0;

  }
  function downloadImage(){

let canvas = document.getElementById("canvas");

if(canvas.width==0){
alert("Please resize an image first.");
return;
}

let link = document.createElement("a");

link.download = "PakToolsHub-Resized-Image.png";

link.href = canvas.toDataURL("image/png");

link.click();

  }
  let dropArea = document.getElementById("dropArea");

dropArea.addEventListener("dragover",function(e){
e.preventDefault();
dropArea.style.background="#dbeafe";
});

dropArea.addEventListener("dragleave",function(){
dropArea.style.background="white";
});

dropArea.addEventListener("drop",function(e){

e.preventDefault();

dropArea.style.background="white";

document.getElementById("imageInput").files = e.dataTransfer.files;

});
  async function shareImage(){

let canvas = document.getElementById("canvas");

if(canvas.width==0){
alert("Please resize an image first.");
return;
}

canvas.toBlob(async function(blob){

let file = new File([blob],"PakToolsHub-Resized-Image.png",{type:"image/png"});

if(navigator.canShare && navigator.canShare({files:[file]})){

await navigator.share({
title:"PakToolsHub Image Resizer",
text:"Resized using PakToolsHub",
files:[file]
});

}else{

alert("Sharing is not supported on this device.");

}

});

  }
  async function copyImage(){

let canvas = document.getElementById("canvas");

if(canvas.width==0){
alert("Please resize an image first.");
return;
}

canvas.toBlob(async(blob)=>{

try{

await navigator.clipboard.write([
new ClipboardItem({"image/png":blob})
]);

alert("✅ Image Copied!");

}catch{

alert("Copy not supported on this device.");

}

});

  }
  let english=true;

function toggleLanguage(){

english=!english;

document.querySelector("h2").innerHTML=
english ? "🖼️ Image Resizer" : "🖼️ تصویر کا سائز تبدیل کریں";

}
</script>

</body>
  </html>
