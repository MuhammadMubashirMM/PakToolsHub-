<style>

<body>

<header class="navbar">
<div class="logo">🛠️ PakToolsHub</div>
</header>

<section class="hero">

<h1>🖼️ Image Watermark Tool</h1>

<p>Add beautiful text watermarks to your images.</p>

</section>
<div class="container">

<div class="input-group">
<label>Select Image</label>
<input type="file" id="imageInput" accept="image/*">
</div>

<div class="input-group">
<label>Watermark Text</label>
<input type="text" id="watermarkText" placeholder="Enter watermark">
</div>

<div class="input-group">
<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="100" value="40">
</div>
<div class="input-group">
<label>Font Color</label>
<input type="color" id="fontColor" value="#ffffff">
</div>

<div class="input-group">
<label>Opacity</label>
<input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.6">
</div>

<div class="input-group">
<label>Watermark Position</label>

<select id="position">
<option value="center">Center</option>
<option value="top-left">Top Left</option>
<option value="top-right">Top Right</option>
<option value="bottom-left">Bottom Left</option>
<option value="bottom-right">Bottom Right</option>
</select>

</div>
<div class="input-group">
<label>
<input type="checkbox" id="repeatWatermark">
Repeat Watermark
</label>
</div>
<div class="input-group">
<label>Rotate Watermark</label>
<input type="range" id="rotate" min="0" max="360" value="45">
</div>  
<button class="btn" id="resetBtn">
Reset
</button>
<button class="btn" id="downloadBtn">
Download Image
</button>

<canvas id="canvas"></canvas>

</div>
</body>
<script>
const imageInput = document.getElementById("imageInput");
const watermarkText = document.getElementById("watermarkText");
const fontSize = document.getElementById("fontSize");
const downloadBtn = document.getElementById("downloadBtn");
const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

let img = new Image();
  const fontColor = document.getElementById("fontColor");
const opacity = document.getElementById("opacity");
  const rotate = document.getElementById("rotate");
const position = document.getElementById("position");
  const repeatWatermark = document.getElementById("repeatWatermark");
const resetBtn = document.getElementById("resetBtn");
  imageInput.addEventListener("change", function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

img.src = event.target.result;

};

reader.readAsDataURL(file);

});

img.onload = function(){

drawCanvas();

};

watermarkText.addEventListener("input", drawCanvas);

fontSize.addEventListener("input", drawCanvas);
fontColor.addEventListener("input", drawCanvas);
opacity.addEventListener("input", drawCanvas);
  rotate.addEventListener("input", drawCanvas);
position.addEventListener("change", drawCanvas);
  repeatWatermark.addEventListener("change", drawCanvas);
function drawCanvas(){

canvas.width = img.width;
canvas.height = img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0);

ctx.font = fontSize.value + "px Arial";

const hex = fontColor.value;

const r = parseInt(hex.substr(1,2),16);
const g = parseInt(hex.substr(3,2),16);
const b = parseInt(hex.substr(5,2),16);

ctx.fillStyle = `rgba(${r},${g},${b},${opacity.value})`;

let x = canvas.width/2;
let y = canvas.height/2;

ctx.textAlign="center";

switch(position.value){

case "top-left":
x=20;
y=40;
ctx.textAlign="left";
break;

case "top-right":
x=canvas.width-20;
y=40;
ctx.textAlign="right";
break;

case "bottom-left":
x=20;
y=canvas.height-20;
ctx.textAlign="left";
break;

case "bottom-right":
x=canvas.width-20;
y=canvas.height-20;
ctx.textAlign="right";
break;

default:
x=canvas.width/2;
y=canvas.height/2;
ctx.textAlign="center";

}

if(repeatWatermark.checked){

for(let i=50;i<canvas.width;i+=200){

for(let j=50;j<canvas.height;j+=150){

ctx.save();

ctx.translate(i,j);

ctx.rotate(rotate.value * Math.PI / 180);

ctx.fillText(watermarkText.value,0,0);

ctx.restore();

}

}

}else{

ctx.fillText(watermarkText.value,x,y);

}

}

downloadBtn.addEventListener("click",function(){

const link=document.createElement("a");

link.download="watermarked-image.png";

link.href=canvas.toDataURL("image/png");

link.click();

});
  resetBtn.addEventListener("click",function(){

watermarkText.value="";
fontSize.value=40;
fontColor.value="#ffffff";
opacity.value=0.6;
position.value="center";

drawCanvas();

});
</script>
