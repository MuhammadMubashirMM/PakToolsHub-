
<!DOCTYPE html>
<html>
<head>
  <title>PakToolsHub - Word Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:Arial; background:#f5f5f5; text-align:center; padding:20px;">

<h1>PakToolsHub</h1>
<h2>Word Counter Tool</h2>

<textarea id="text" placeholder="Type or paste your text here..."
style="width:90%; height:200px; padding:10px; font-size:16px;"
oninput="countWords()"></textarea>

<h3>Words: <span id="words">0</span></h3>
<h3>Characters: <span id="characters">0</span></h3>

<script>
function countWords(){
let text=document.getElementById("text").value;
let words=text.trim()===""?0:text.trim().split(/\s+/).length;
document.getElementById("words").innerHTML=words;
document.getElementById("characters").innerHTML=text.length;
}
</script>

</body>
</html>
