
<!DOCTYPE html>
<html>
<head>
  <title>PakToolsHub - Word Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
button{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  margin:8px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}
</style>
</head>
<body style="font-family:Arial; background:#f5f5f5; text-align:center; padding:20px;">

<h1>PakToolsHub</h1>
<h2>Word Counter Tool</h2>

<textarea id="text" placeholder="Type or paste your text here..."
style="width:90%; height:200px; padding:10px; font-size:16px;"
oninput="countWords()"></textarea>
<br><br>

<button onclick="copyText()">📋 Copy Text</button>
<button onclick="clearText()">🗑️ Clear</button>
<h3>Words: <span id="words">0</span></h3>
<h3>Characters: <span id="characters">0</span></h3>

<script>
function countWords(){
let text=document.getElementById("text").value;
let words=text.trim()===""?0:text.trim().split(/\s+/).length;
document.getElementById("words").innerHTML=words;
document.getElementById("characters").innerHTML=text.length;
}
function copyText(){
  let text = document.getElementById("text");
  text.select();
  document.execCommand("copy");
  alert("Text Copied!");
}

function clearText(){
  document.getElementById("text").value = "";
  countWords();
} 
</script>

</body>

</html>
