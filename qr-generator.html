<!DOCTYPE html>
<html>
<head>
<title>PakToolsHub - QR Code Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<button onclick="downloadQR()">📥 Download QR Code</button>
<style>
body{
font-family:Arial;
background:#eef4ff;
margin:0;
text-align:center;
}

.header{
background:#2563eb;
color:white;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input{
width:90%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#qrcode{
margin-top:20px;
display:flex;
justify-content:center;
}
</style>

</head>

<body>

<div class="header">
<h1>PakToolsHub</h1>
<p>Free Online Tools</p>
</div>

<div class="card">

<h2>🔳 QR Code Generator</h2>

<input type="text" id="text" placeholder="Enter text or URL">

<br>

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

</div>

<script>

function generateQR(){

document.getElementById("qrcode").innerHTML="";

let text=document.getElementById("text").value;

if(text==""){
alert("Please enter text or URL");
return;
}

new QRCode(document.getElementById("qrcode"),{
text:text,
width:220,
height:220
});

}
function downloadQR(){

let img = document.querySelector("#qrcode img");

if(!img){
alert("Please generate a QR Code first.");
return;
}

let link = document.createElement("a");
link.href = img.src;
link.download = "PakToolsHub-QRCode.png";
link.click();

  }
</script>

</body>
  </html>
