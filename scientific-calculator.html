<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator Pro | PakToolsHub</title>

<meta name="description" content="Free Scientific Calculator with advanced math functions.">
<meta name="keywords" content="Scientific Calculator, Online Calculator, PakToolsHub">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.calculator{
width:100%;
max-width:430px;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:15px;
font-size:28px;
}

#display{
width:100%;
height:70px;
font-size:30px;
text-align:right;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#f2f5ff;
margin-bottom:20px;
}

.buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

button{
height:58px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:#2563eb;
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.operator{
background:#ff9800;
}

.equal{
background:#16a34a;
}

.clear{
background:#dc2626;
}
  .dark{
background:#111827;
color:white;
}

.dark .calculator{
background:#1f2937;
}

.dark #display{
background:#374151;
color:white;
}

.dark button{
background:#2563eb;
}
#historyBox{
margin-top:20px;
padding:15px;
background:#f5f7ff;
border-radius:12px;
max-height:200px;
overflow-y:auto;
}

#historyBox h3{
margin-bottom:10px;
color:#2563eb;
}

#historyList{
list-style:none;
padding:0;
}

#historyList li{
padding:8px;
border-bottom:1px solid #ddd;
font-size:16px;
  }
  
</style>

</head>

<body>

<div class="calculator">
<div id="historyBox">
<h3>History</h3>
<ul id="historyList"></ul>
</div>
<h1>Scientific Calculator</h1>

<input type="text" id="display" readonly>
<button id="copyBtn">📋 Copy Result</button>
  <button id="modeBtn">DEG</button>
  <button id="shareBtn">📤 Share Calculator</button>
<div class="buttons">

<button class="clear">AC</button>
<button>⌫</button>
<button>%</button>
<button>(</button>
<button>)</button>

<button>sin</button>
<button>cos</button>
<button>tan</button>
<button>log</button>
<button>ln</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">÷</button>
<button>√</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">×</button>
<button>x²</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">-</button>
<button>xʸ</button>

<button>0</button>
<button>.</button>
<button>π</button>
<button>e</button>
<button class="operator">+</button>

<button>!</button>
<button>Ans</button>
<button>EXP</button>
<button class="equal">=</button>

</div> 

</div>
<script>
  let isDegree = true;

const modeBtn = document.getElementById("modeBtn");
const historyList = document.getElementById("historyList");
const display = document.getElementById("display");
const copyBtn = document.getElementById("copyBtn");
let expression = "";
let lastAnswer = "";

const buttons = document.querySelectorAll(".buttons button");

buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

const value = btn.innerText;

switch(value){

case "AC":
expression="";
display.value="";
break;

case "⌫":
expression=expression.slice(0,-1);
display.value=expression;
break;

case "=":

try{

let exp = expression
.replace(/÷/g,"/")
.replace(/×/g,"*")
.replace(/π/g,Math.PI)
.replace(/e/g,Math.E);

lastAnswer = eval(exp);

display.value = lastAnswer;
const li = document.createElement("li");
li.textContent = expression + " = " + lastAnswer;
historyList.prepend(li);
 localStorage.setItem("calcHistory", historyList.innerHTML);
expression = lastAnswer.toString();

}catch{

display.value="Error";
expression="";

}

break;

case "Ans":
expression+=lastAnswer;
display.value=expression;
break;
case "xʸ":

expression += "**";
display.value = expression;

break;

case "!":

try{

let n = Number(expression);

if(n<0 || !Number.isInteger(n)){
display.value = "Error";
expression = "";
break;
}

let fact = 1;

for(let i=2;i<=n;i++){
fact *= i;
}

expression = fact.toString();
display.value = expression;

}catch{

display.value = "Error";
expression = "";

}

break;

case "√":

expression += "Math.sqrt(";
display.value = expression;

break;

case "x²":

expression += "**2";
display.value = expression;

break;

case "π":

expression += Math.PI;
display.value = expression;

break;

case "e":

expression += Math.E;
display.value = expression;

break;
    case "sin":

expression += "Math.sin(";
display.value = expression;

break;

case "cos":

expression += "Math.cos(";
display.value = expression;

break;

case "tan":

expression += "Math.tan(";
display.value = expression;

break;

case "log":

expression += "Math.log10(";
display.value = expression;

break;

case "ln":

expression += "Math.log(";
display.value = expression;

break;
  default: 
expression+=value;
display.value=expression;
break;
}

});

});
document.addEventListener("keydown", function(e){

const key = e.key;

if("0123456789+-*/().".includes(key)){
expression += key;
display.value = expression;
}

if(key === "Enter"){
e.preventDefault();

try{

let exp = expression.replace(/π/g,Math.PI)
.replace(/e/g,Math.E);

let result = eval(exp);

display.value = result;

expression = result.toString();

}catch{

display.value = "Error";
expression = "";

}

}

if(key === "Backspace"){
expression = expression.slice(0,-1);
display.value = expression;
}

if(key === "Escape"){
expression = "";
display.value = "";
}

});
  const themeBtn = document.getElementById("themeBtn");

themeBtn.addEventListener("click", function(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
themeBtn.innerHTML="☀️ Light Mode";
}else{
themeBtn.innerHTML="🌙 Dark Mode";
}

});
  copyBtn.addEventListener("click", function(){

if(display.value==""){
alert("No result to copy!");
return;
}

navigator.clipboard.writeText(display.value);

alert("Result Copied!");

});
  window.onload = function(){

const savedHistory = localStorage.getItem("calcHistory");

if(savedHistory){
historyList.innerHTML = savedHistory;
}

};
  modeBtn.addEventListener("click", function(){

isDegree = !isDegree;

modeBtn.innerHTML = isDegree ? "DEG" : "RAD";

});
 const shareBtn = document.getElementById("shareBtn");

shareBtn.addEventListener("click", async () => {

const shareData = {
title: "Scientific Calculator - PakToolsHub",
text: "Use this free Scientific Calculator by PakToolsHub.",
url: window.location.href
};

if (navigator.share) {
await navigator.share(shareData);
} else {
navigator.clipboard.writeText(window.location.href);
alert("Link copied successfully!");
}

}); 
  </script>
</body>
  </html>
